networks:
  insighton-net:
    name: insighton-net
    driver: bridge

services:

  insighton-config:
      image: ghcr.io/nhnacademy-aiot3-insighton/insighton-config:latest
      container_name: insighton-config
      hostname: insighton-config
      networks: [insighton-net]
      environment:
        CONFIG_GITHUB_USERNAME: ${CONFIG_GITHUB_USERNAME}
        CONFIG_GITHUB_TOKEN: ${CONFIG_GITHUB_TOKEN}
        CONFIG_REPO_URI: ${CONFIG_REPO_URI}
        CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME}
        CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD}
        DB_URL: ${DB_URL}
        DB_USERNAME: ${DB_USERNAME}
        DB_PASSWORD: ${DB_PASSWORD}
        REDIS_HOST: ${REDIS_HOST}
        REDIS_PORT: ${REDIS_PORT}
        REDIS_PASSWORD: ${REDIS_PASSWORD}
        RABBITMQ_HOST: ${RABBITMQ_HOST}
        RABBITMQ_AMQP_PORT: ${RABBITMQ_AMQP_PORT}
        RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
        RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
        INFLUXDB_URL: ${INFLUXDB_URL}
        INFLUXDB_ORG: ${INFLUXDB_ORG}
        INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
        INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      restart: unless-stopped
      logging:
        driver: json-file
        options:
          max-size: "10m"
          max-file: "3"

  # Eureka
  insighton-eureka:
    image: ghcr.io/nhnacademy-aiot3-insighton/insighton-eureka:latest
    container_name: insighton-eureka
    hostname: insighton-eureka
    networks: [insighton-net]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Gateway
  insighton-gateway-1:
    image: ghcr.io/nhnacademy-aiot3-insighton/insighton-gateway:latest
    container_name: insighton-gateway-1
    hostname: insighton-gateway-1
    networks: [insighton-net]
    environment:
      SPRING_PROFILES_ACTIVE: gateway1
    restart: unless-stopped
    depends_on: [insighton-eureka]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  insighton-gateway-2:
    image: ghcr.io/nhnacademy-aiot3-insighton/insighton-gateway:latest
    container_name: insighton-gateway-2
    hostname: insighton-gateway-2
    networks: [insighton-net]
    environment:
      SPRING_PROFILES_ACTIVE: gateway2
    restart: unless-stopped
    depends_on: [insighton-eureka]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Front
  insighton-front-1:
    image: ghcr.io/nhnacademy-aiot3-insighton/insighton-front:latest
    container_name: insighton-front-1
    hostname: insighton-front-1
    networks: [insighton-net]
    ports:
      - "10440:8080"
    environment:
      SPRING_PROFILES_ACTIVE: front1
    restart: unless-stopped
    depends_on: [insighton-eureka]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  insighton-front-2:
    image: ghcr.io/nhnacademy-aiot3-insighton/insighton-front:latest
    container_name: insighton-front-2
    hostname: insighton-front-2
    networks: [insighton-net]
    ports:
      - "10441:8080"
    environment:
      SPRING_PROFILES_ACTIVE: front2
    restart: unless-stopped
    depends_on: [insighton-eureka]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Core
  insighton-core-1:
    image: ghcr.io/nhnacademy-aiot3-insighton/insighton-core:latest
    container_name: insighton-core-1
    hostname: insighton-core-1
    networks: [insighton-net]
    environment:
      SPRING_PROFILES_ACTIVE: core1
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD}
    restart: unless-stopped
    depends_on: [insighton-eureka, insighton-config]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  insighton-core-2:
    image: ghcr.io/nhnacademy-aiot3-insighton/insighton-core:latest
    container_name: insighton-core-2
    hostname: insighton-core-2
    networks: [insighton-net]
    environment:
      SPRING_PROFILES_ACTIVE: core2
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD}
    restart: unless-stopped
    depends_on: [insighton-eureka, insighton-config]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Auth
  insighton-auth-1:
    image: ghcr.io/nhnacademy-aiot3-insighton/insighton-auth:latest
    container_name: insighton-auth-1
    hostname: insighton-auth-1
    networks: [insighton-net]
    environment:
      SPRING_PROFILES_ACTIVE: auth1
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD}
    restart: unless-stopped
    depends_on: [insighton-eureka, insighton-config]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  insighton-auth-2:
    image: ghcr.io/nhnacademy-aiot3-insighton/insighton-auth:latest
    container_name: insighton-auth-2
    hostname: insighton-auth-2
    networks: [insighton-net]
    environment:
      SPRING_PROFILES_ACTIVE: auth1
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD}
    restart: unless-stopped
    depends_on: [insighton-eureka, insighton-config]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # AI
  insighton-ai-1:
    image: ghcr.io/nhnacademy-aiot3-insighton/insighton-ai:latest
    container_name: insighton-ai-1
    hostname: insighton-ai-1
    networks: [insighton-net]
    environment:
      SPRING_PROFILES_ACTIVE: ai1
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD}
    restart: unless-stopped
    depends_on: [insighton-eureka, insighton-config]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  insighton-ai-2:
    image: ghcr.io/nhnacademy-aiot3-insighton/insighton-ai:latest
    container_name: insighton-ai-2
    hostname: insighton-ai-2
    networks: [insighton-net]
    environment:
      SPRING_PROFILES_ACTIVE: ai1
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD}
    restart: unless-stopped
    depends_on: [insighton-eureka, insighton-config]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # RuleEngine
  insighton-ruleengine-1:
    image: ghcr.io/nhnacademy-aiot3-insighton/insighton-ruleengine:latest
    container_name: insighton-ruleengine-1
    hostname: insighton-ruleengine-1
    networks: [insighton-net]
    environment:
      SPRING_PROFILES_ACTIVE: ruleengine1
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD}
    restart: unless-stopped
    depends_on: [insighton-eureka, insighton-config]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  insighton-ruleengine-2:
    image: ghcr.io/nhnacademy-aiot3-insighton/insighton-ruleengine:latest
    container_name: insighton-ruleengine-2
    hostname: insighton-ruleengine-2
    networks: [insighton-net]
    environment:
      SPRING_PROFILES_ACTIVE: ruleengine1
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD}
    restart: unless-stopped
    depends_on: [insighton-eureka, insighton-config]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"