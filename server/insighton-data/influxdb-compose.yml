networks:
  insighton-net:
    external: true

services:
  influxdb:
    image: influxdb:2.7
    container_name: insighton-influxdb
    hostname: insighton-influxdb
    networks: [insighton-net]
    ports:
      - "127.0.0.1:10456:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: insighton-admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_INIT_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: insighton
      DOCKER_INFLUXDB_INIT_BUCKET: insighton-bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_INIT_TOKEN}
    restart: unless-stopped

volumes:
  influxdb-data: