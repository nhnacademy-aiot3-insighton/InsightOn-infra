limit_req_zone $binary_remote_addr zone=insighton_general_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=insighton_conn_limit:10m;

upstream insighton-front {
        server 127.0.0.1:10440 max_fails=2 fail_timeout=10s;
        server 127.0.0.1:10441 max_fails=2 fail_timeout=10s;
}
server {
        listen 80;
        server_name insighton.store www.insighton.store;
        return 301 https://$host$request_uri;
}

server {
        listen 443 ssl;
        server_name insighton.store www.insighton.store;

        ssl_certificate /home/aiot3/aiot3-team3/nginx/ssl/insighton.store.crt;
        ssl_certificate_key /home/aiot3/aiot3-team3/nginx/ssl/insighton.store.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:insighton_ssl:10m;
        ssl_session_timeout 10m;

        large_client_header_buffers 4 16k;
        client_header_buffer_size 4k;

        client_body_timeout 10s;
        client_header_timeout 10s;
        send_timeout 10s;

        access_log /home/aiot3/aiot3-team3/nginx/logs/access.log;
        error_log /home/aiot3/aiot3-team3/nginx/logs/error.log;

        location / {
                limit_req zone=insighton_general_limit burst=20 nodelay;
                limit_conn insighton_conn_limit 20;
                limit_req_status 429;

                proxy_set_header X-Forwarded-For $remote_addr;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Host $http_host;
                proxy_pass http://insighton-front;

                proxy_buffer_size 16k;
                proxy_buffers 4 16k;
        }

        location /grafana/ {
                limit_req zone=insighton_general_limit burst=20 nodelay;
                limit_req_status 429;

                auth_basic "InsightOn Team Only";
                auth_basic_user_file /home/aiot3/aiot3-team3/nginx/.htpasswd;

                proxy_set_header X-Forwarded-For $remote_addr;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Host $http_host;
                proxy_pass http://127.0.0.1:10457;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
        }
}